<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><title>Stage Colors</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../tokens.css">
<style>
  body{margin:0;padding:20px;background:var(--bg);font-family:var(--font-sans)}
  .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
  .cell{border-radius:14px;padding:14px 12px;min-height:100px;display:flex;flex-direction:column;justify-content:space-between;border:1px solid}
  .num{font-family:var(--font-mono);font-weight:800;font-size:24px;line-height:1}
  .name{font-size:12px;font-weight:700}
  .dot{width:14px;height:14px;border-radius:4px}
</style></head><body>
<div class="grid">
  <div class="cell" style="background:#EEF0FF;border-color:#BCC3FF;color:#3730A3"><div class="num">01</div><div><div class="name">자료구조·알고리즘</div><div class="dot" style="background:#4F46E5;margin-top:6px"></div></div></div>
  <div class="cell" style="background:#E0F7FA;border-color:#A7E3EA;color:#0E7490"><div class="num">02</div><div><div class="name">브라우저·네트워크</div><div class="dot" style="background:#06B6D4;margin-top:6px"></div></div></div>
  <div class="cell" style="background:#F3EEFE;border-color:#D9C8FB;color:#6B21A8"><div class="num">03</div><div><div class="name">운영체제</div><div class="dot" style="background:#8B5CF6;margin-top:6px"></div></div></div>
  <div class="cell" style="background:#E7F8F0;border-color:#A7E8C8;color:#065F46"><div class="num">04</div><div><div class="name">데이터베이스</div><div class="dot" style="background:#10B981;margin-top:6px"></div></div></div>
  <div class="cell" style="background:#FFE8EE;border-color:#FFBDCE;color:#9D174D"><div class="num">05</div><div><div class="name">심화 FE CS</div><div class="dot" style="background:#EC4899;margin-top:6px"></div></div></div>
  <div class="cell" style="background:#FFF4E0;border-color:#FCD9A0;color:#92400E"><div class="num">06</div><div><div class="name">소프트웨어 공학</div><div class="dot" style="background:#F59E0B;margin-top:6px"></div></div></div>
</div>
</body></html>
