<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><title>Shadows</title>
<link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="../tokens.css">
<style>body{margin:0;padding:28px;background:#FAFAFA;font-family:var(--font-sans);display:flex;gap:20px;justify-content:space-between}
.b{background:#fff;width:130px;height:90px;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;border:1px solid rgba(0,0,0,.03)}
.k{font-family:var(--font-mono);font-size:11px;font-weight:700;color:#18181B}
.v{font-family:var(--font-mono);font-size:10px;color:#71717A;margin-top:2px}</style></head><body>
<div class="b" style="box-shadow:0 1px 2px rgb(0 0 0 / 0.04)"><div class="k">xs</div><div class="v">1 · 2</div></div>
<div class="b" style="box-shadow:0 2px 6px rgb(0 0 0 / 0.05), 0 1px 2px rgb(0 0 0 / 0.04)"><div class="k">sm</div><div class="v">2 · 6</div></div>
<div class="b" style="box-shadow:0 8px 24px rgb(0 0 0 / 0.06), 0 2px 6px rgb(0 0 0 / 0.04)"><div class="k">md</div><div class="v">8 · 24</div></div>
<div class="b" style="box-shadow:0 20px 48px rgb(0 0 0 / 0.12), 0 4px 12px rgb(0 0 0 / 0.06)"><div class="k">lg</div><div class="v">20 · 48</div></div>
<div class="b" style="box-shadow:0 32px 80px rgb(0 0 0 / 0.18), 0 8px 20px rgb(0 0 0 / 0.08)"><div class="k">xl</div><div class="v">32 · 80</div></div>
</body></html>
