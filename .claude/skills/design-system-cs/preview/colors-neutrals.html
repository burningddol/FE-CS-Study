<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><title>Colors — Neutrals</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../tokens.css">
<style>
  body{margin:0;padding:20px;background:var(--bg);font-family:var(--font-sans)}
  .row{display:flex;gap:6px;align-items:stretch}
  .sw{flex:1;border-radius:10px;padding:10px 10px;display:flex;flex-direction:column;justify-content:space-between;min-height:88px;border:1px solid var(--border-subtle)}
  .sw .k{font-family:var(--font-mono);font-size:10px;opacity:.8}
  .sw .v{font-family:var(--font-mono);font-size:10px;opacity:.8}
  .label{font-size:12px;color:var(--fg-muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin:0 0 8px}
</style></head><body>
<div class="label">Neutral scale · 11 steps</div>
<div class="row">
  <div class="sw" style="background:#FFFFFF;color:#18181B"><span class="k">0</span><span class="v">#FFFFFF</span></div>
  <div class="sw" style="background:#FAFAFA;color:#18181B"><span class="k">50</span><span class="v">#FAFAFA</span></div>
  <div class="sw" style="background:#F4F4F5;color:#18181B"><span class="k">100</span><span class="v">#F4F4F5</span></div>
  <div class="sw" style="background:#E8E8EC;color:#18181B"><span class="k">200</span><span class="v">#E8E8EC</span></div>
  <div class="sw" style="background:#D4D4D8;color:#18181B"><span class="k">300</span><span class="v">#D4D4D8</span></div>
  <div class="sw" style="background:#A1A1AA;color:#fff"><span class="k">400</span><span class="v">#A1A1AA</span></div>
  <div class="sw" style="background:#71717A;color:#fff"><span class="k">500</span><span class="v">#71717A</span></div>
  <div class="sw" style="background:#52525B;color:#fff"><span class="k">600</span><span class="v">#52525B</span></div>
  <div class="sw" style="background:#3F3F46;color:#fff"><span class="k">700</span><span class="v">#3F3F46</span></div>
  <div class="sw" style="background:#27272A;color:#fff"><span class="k">800</span><span class="v">#27272A</span></div>
  <div class="sw" style="background:#18181B;color:#fff"><span class="k">900</span><span class="v">#18181B</span></div>
  <div class="sw" style="background:#0A0A0A;color:#fff"><span class="k">1000</span><span class="v">#0A0A0A</span></div>
</div>
</body></html>
