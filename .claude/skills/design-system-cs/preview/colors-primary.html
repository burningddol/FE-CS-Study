<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><title>Colors — Primary</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../tokens.css">
<style>
  body{margin:0;padding:20px;background:var(--bg);font-family:var(--font-sans)}
  .row{display:flex;gap:8px;align-items:stretch}
  .sw{flex:1;border-radius:10px;padding:10px 12px;display:flex;flex-direction:column;justify-content:space-between;min-height:88px;border:1px solid var(--border-subtle)}
  .sw .k{font-family:var(--font-mono);font-size:11px;opacity:.85}
  .sw .v{font-family:var(--font-mono);font-size:11px;opacity:.85}
  .label{font-size:12px;color:var(--fg-muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin:0 0 8px}
</style></head><body>
<div class="label">Primary · Indigo</div>
<div class="row">
  <div class="sw" style="background:#EEF0FF;color:#1F1C5C"><span class="k">50</span><span class="v">#EEF0FF</span></div>
  <div class="sw" style="background:#DDE1FF;color:#1F1C5C"><span class="k">100</span><span class="v">#DDE1FF</span></div>
  <div class="sw" style="background:#BCC3FF;color:#1F1C5C"><span class="k">200</span><span class="v">#BCC3FF</span></div>
  <div class="sw" style="background:#9AA3FF;color:#1F1C5C"><span class="k">300</span><span class="v">#9AA3FF</span></div>
  <div class="sw" style="background:#7B85F5;color:#fff"><span class="k">400</span><span class="v">#7B85F5</span></div>
  <div class="sw" style="background:#4F46E5;color:#fff;outline:2px solid #4F46E5;outline-offset:2px"><span class="k">500 ·</span><span class="v">#4F46E5</span></div>
  <div class="sw" style="background:#4338CA;color:#fff"><span class="k">600</span><span class="v">#4338CA</span></div>
  <div class="sw" style="background:#3730A3;color:#fff"><span class="k">700</span><span class="v">#3730A3</span></div>
  <div class="sw" style="background:#2E2A7F;color:#fff"><span class="k">800</span><span class="v">#2E2A7F</span></div>
  <div class="sw" style="background:#1F1C5C;color:#fff"><span class="k">900</span><span class="v">#1F1C5C</span></div>
</div>
</body></html>
