<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><title>Spacing scale</title>
<link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="../tokens.css">
<style>body{margin:0;padding:20px;background:var(--bg);font-family:var(--font-sans)}
.row{display:flex;align-items:center;gap:12px;padding:4px 0}
.name{font-family:var(--font-mono);font-size:11px;color:var(--fg-muted);width:72px}
.val{font-family:var(--font-mono);font-size:11px;color:var(--fg);width:48px;text-align:right}
.bar{background:#4F46E5;height:14px;border-radius:3px}</style></head><body>
<div class="row"><span class="name">--space-1</span><span class="val">4</span><span class="bar" style="width:4px"></span></div>
<div class="row"><span class="name">--space-2</span><span class="val">8</span><span class="bar" style="width:8px"></span></div>
<div class="row"><span class="name">--space-3</span><span class="val">12</span><span class="bar" style="width:12px"></span></div>
<div class="row"><span class="name">--space-4</span><span class="val">16</span><span class="bar" style="width:16px"></span></div>
<div class="row"><span class="name">--space-5</span><span class="val">20</span><span class="bar" style="width:20px"></span></div>
<div class="row"><span class="name">--space-6</span><span class="val">24</span><span class="bar" style="width:24px"></span></div>
<div class="row"><span class="name">--space-7</span><span class="val">32</span><span class="bar" style="width:32px"></span></div>
<div class="row"><span class="name">--space-8</span><span class="val">48</span><span class="bar" style="width:48px"></span></div>
<div class="row"><span class="name">--space-9</span><span class="val">64</span><span class="bar" style="width:64px"></span></div>
<div class="row"><span class="name">--space-10</span><span class="val">96</span><span class="bar" style="width:96px"></span></div>
</body></html>
