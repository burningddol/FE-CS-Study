<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="../tokens.css">
<style>body{margin:0;padding:20px;background:var(--bg);font-family:var(--font-sans);display:flex;gap:14px;align-items:flex-end}
.b{background:#EEF0FF;border:1.5px solid #BCC3FF;width:90px;height:90px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;color:#3730A3}
.k{font-family:var(--font-mono);font-size:11px;font-weight:700}
.v{font-family:var(--font-mono);font-size:10px;opacity:.7}</style></head><body>
<div class="b" style="border-radius:6px"><div class="k">sm</div><div class="v">6px</div></div>
<div class="b" style="border-radius:10px"><div class="k">md</div><div class="v">10px</div></div>
<div class="b" style="border-radius:14px"><div class="k">lg</div><div class="v">14px</div></div>
<div class="b" style="border-radius:20px"><div class="k">xl</div><div class="v">20px</div></div>
<div class="b" style="border-radius:28px"><div class="k">2xl</div><div class="v">28px</div></div>
<div class="b" style="border-radius:9999px"><div class="k">full</div><div class="v">9999</div></div>
</body></html>
