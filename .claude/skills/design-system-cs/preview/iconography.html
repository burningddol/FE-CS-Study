<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><title>Iconography</title>
<link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="../tokens.css">
<style>body{margin:0;padding:20px;background:var(--bg);font-family:var(--font-sans)}
.label{font-size:12px;color:var(--fg-muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin:0 0 10px}
.grid{display:grid;grid-template-columns:repeat(8,1fr);gap:12px}
.c{aspect-ratio:1;border:1px solid #E8E8EC;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:#3F3F46}
.c svg{width:20px;height:20px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.c span{font-size:10px;color:#71717A;font-family:var(--font-mono)}</style></head><body>
<div class="label">Lucide · 2px stroke · 16~24 default</div>
<div class="grid">
<div class="c"><svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2zM22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg><span>book</span></div>
<div class="c"><svg viewBox="0 0 24 24"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg><span>video</span></div>
<div class="c"><svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg><span>play</span></div>
<div class="c"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg><span>check</span></div>
<div class="c"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.3-4.3"/></svg><span>search</span></div>
<div class="c"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>user</span></div>
<div class="c"><svg viewBox="0 0 24 24"><path d="M12 2l2.39 7.36H22l-6.18 4.49L18.18 21 12 16.5 5.82 21l2.36-7.15L2 9.36h7.61z"/></svg><span>star</span></div>
<div class="c"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg><span>calendar</span></div>
<div class="c"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><span>clock</span></div>
<div class="c"><svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 113 3L7 19l-4 1 1-4z"/></svg><span>edit</span></div>
<div class="c"><svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/></svg><span>cpu</span></div>
<div class="c"><svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg><span>zap</span></div>
<div class="c"><svg viewBox="0 0 24 24"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14c0 1.7 4 3 9 3s9-1.3 9-3V5"/><path d="M3 12c0 1.7 4 3 9 3s9-1.3 9-3"/></svg><span>database</span></div>
<div class="c"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15 15 0 014 10 15 15 0 01-4 10 15 15 0 01-4-10 15 15 0 014-10z"/></svg><span>globe</span></div>
<div class="c"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 11-4 0v-.09A1.65 1.65 0 009 19.4"/></svg><span>settings</span></div>
<div class="c"><svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"/></svg><span>bell</span></div>
</div>
</body></html>
