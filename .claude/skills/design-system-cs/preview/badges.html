<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><title>Badges</title>
<link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="../tokens.css">
<style>body{margin:0;padding:20px;background:var(--bg);font-family:var(--font-sans);display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.b{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;padding:4px 10px;border-radius:9999px;border:1px solid transparent}
.dot{width:6px;height:6px;border-radius:50%}</style></head><body>
<span class="b" style="background:#EEF0FF;color:#3730A3"><span class="dot" style="background:#4F46E5"></span>1단계</span>
<span class="b" style="background:#E0F7FA;color:#0E7490"><span class="dot" style="background:#06B6D4"></span>2단계</span>
<span class="b" style="background:#F3EEFE;color:#6B21A8"><span class="dot" style="background:#8B5CF6"></span>3단계</span>
<span class="b" style="background:#E7F8F0;color:#065F46"><span class="dot" style="background:#10B981"></span>4단계</span>
<span class="b" style="background:#FFE8EE;color:#9D174D"><span class="dot" style="background:#EC4899"></span>5단계</span>
<span class="b" style="background:#FFF4E0;color:#92400E"><span class="dot" style="background:#F59E0B"></span>6단계</span>
<span class="b" style="background:#E7F8F0;color:#065F46">완료</span>
<span class="b" style="background:#F4F4F5;color:#52525B">예정</span>
<span class="b" style="background:#FEECEC;color:#DC2626">마감 임박</span>
<span class="b" style="background:#FFF8E6;color:#92400E;border-color:#FCD9A0">NEW</span>
<span class="b" style="background:#18181B;color:#fff">PRO</span>
<span class="b" style="background:#fff;color:#52525B;border-color:#E8E8EC">무료</span>
</body></html>
