<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><title>Logo</title>
<link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="../tokens.css">
<style>body{margin:0;padding:24px;background:var(--bg);font-family:var(--font-sans);display:grid;grid-template-columns:1fr 1fr;gap:16px}
.box{border:1px solid #E8E8EC;border-radius:14px;padding:20px;display:flex;align-items:center;justify-content:center;min-height:100px}
.dark{background:#0A0A0A}
.label{font-family:var(--font-mono);font-size:10px;color:#71717A;margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em;font-weight:600}</style></head><body>
<div>
  <div class="label">Wordmark · light</div>
  <div class="box"><img src="../assets/logo.svg" alt="" height="36"/></div>
</div>
<div>
  <div class="label">Mark only</div>
  <div class="box"><img src="../assets/logo-mark.svg" alt="" height="48"/></div>
</div>
</body></html>
