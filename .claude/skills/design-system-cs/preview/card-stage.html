<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><title>Stage card</title>
<link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="../tokens.css">
<style>body{margin:0;padding:20px;background:#FAFAFA;font-family:var(--font-sans)}
.card{background:#EEF0FF;border:1px solid #BCC3FF;border-radius:20px;padding:20px 22px;max-width:640px;display:flex;gap:18px;align-items:center;position:relative;overflow:hidden}
.num{font-family:var(--font-mono);font-weight:800;font-size:72px;line-height:.9;color:#4F46E5;opacity:.22;letter-spacing:-.04em}
.body{flex:1}
.kicker{font-size:12px;font-weight:700;color:#3730A3;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.tt{font-size:22px;font-weight:800;color:#1F1C5C;letter-spacing:-.015em;margin:0 0 6px}
.sub{font-size:13px;color:#3730A3;line-height:1.55;margin:0}
.dur{position:absolute;top:18px;right:22px;font-size:12px;font-weight:600;color:#3730A3;background:rgba(255,255,255,.6);padding:4px 10px;border-radius:9999px}</style></head><body>
<div class="card">
  <div class="num">01</div>
  <div class="body">
    <div class="kicker">Stage 01</div>
    <h3 class="tt">자료구조·알고리즘</h3>
    <p class="sub">비전공자가 전공자와 가장 많이 벌어지는 영역. 왜 그 복잡도를 갖는지 증명할 수 있는 수준을 목표로 해요.</p>
  </div>
  <div class="dur">2.5주</div>
</div>
</body></html>
