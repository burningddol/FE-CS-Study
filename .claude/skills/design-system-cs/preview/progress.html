<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><title>Progress</title>
<link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="../tokens.css">
<style>body{margin:0;padding:20px;background:var(--bg);font-family:var(--font-sans);display:grid;gap:14px}
.row{display:flex;flex-direction:column;gap:6px}
.label{display:flex;justify-content:space-between;font-size:13px}
.t{font-weight:600;color:#27272A}
.n{font-family:var(--font-mono);font-weight:700;color:#4F46E5}
.track{height:8px;background:#F4F4F5;border-radius:9999px;overflow:hidden}
.fill{height:100%;background:#4F46E5;border-radius:9999px}
.fill.s2{background:#06B6D4}
.fill.s4{background:#10B981}
.fill.done{background:linear-gradient(90deg,#10B981,#06B6D4)}</style></head><body>
<div class="row"><div class="label"><span class="t">전체 진행률</span><span class="n">64%</span></div><div class="track"><div class="fill" style="width:64%"></div></div></div>
<div class="row"><div class="label"><span class="t">1단계 · 자료구조·알고리즘</span><span class="n">100%</span></div><div class="track"><div class="fill done" style="width:100%"></div></div></div>
<div class="row"><div class="label"><span class="t">2단계 · 브라우저·네트워크</span><span class="n">45%</span></div><div class="track"><div class="fill s2" style="width:45%"></div></div></div>
<div class="row"><div class="label"><span class="t">4단계 · 데이터베이스</span><span class="n">0%</span></div><div class="track"><div class="fill s4" style="width:0%"></div></div></div>
</body></html>
