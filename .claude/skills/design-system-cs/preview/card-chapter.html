<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><title>Chapter card</title>
<link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="../tokens.css">
<style>body{margin:0;padding:20px;background:#FAFAFA;font-family:var(--font-sans)}
.card{background:#fff;border:1px solid #E8E8EC;border-radius:14px;padding:18px 20px;box-shadow:0 2px 6px rgb(0 0 0 / 0.05), 0 1px 2px rgb(0 0 0 / 0.04);display:flex;gap:16px;align-items:center;max-width:640px}
.ic{width:44px;height:44px;border-radius:10px;background:#E0F7FA;color:#0E7490;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ic svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.body{flex:1;min-width:0}
.meta{display:flex;gap:8px;margin-bottom:4px;font-size:12px;color:#71717A;font-weight:500}
.tt{font-size:17px;font-weight:700;color:#18181B;letter-spacing:-0.01em;margin:0 0 4px}
.sub{font-size:13px;color:#52525B;line-height:1.5;margin:0}
.t{font-family:var(--font-mono);font-size:12px;color:#71717A;flex-shrink:0;text-align:right}
.t strong{color:#18181B;font-weight:700;display:block}</style></head><body>
<div class="card">
  <div class="ic"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg></div>
  <div class="body">
    <div class="meta">Ch 2-2 · HTTP와 HTTPS</div>
    <h3 class="tt">요청/응답 구조부터 TLS 1.3 까지</h3>
    <p class="sub">상태 코드·헤더·HTTP 2·3 버전 차이를 실전 예시로 정리해요.</p>
  </div>
  <div class="t"><strong>28분</strong>12강</div>
</div>
</body></html>
